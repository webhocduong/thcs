<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>THCS Hòa Chung</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>


<!-- HEADER -->

<header>

    <h1 class="logo">
        THCS Hòa Chung
    </h1>


    <!-- LOGIN -->

    <div id="authArea">

        <input
            type="email"
            id="email"
            placeholder="Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Mật khẩu"
        >

        <button id="registerBtn">
            Đăng ký
        </button>

        <button id="loginBtn">
            Đăng nhập
        </button>

    </div>


    <!-- USER -->

    <div id="userArea"></div>

</header>


<!-- HERO -->

<section class="hero">

    <h2>
        Chào mừng đến với
        <br>
        THCS Hòa Chung
    </h2>

    <p>
        Website hoạt động học sinh
    </p>

    <a href="post.html"
       class="heroBtn">

       Đăng bài & Xem bài viết

    </a>

</section>


<!-- THÔNG BÁO -->

<section class="activities">

    <div class="card">

        <h3>
            🎉 Hoạt động trường
        </h3>

        <p>
            Cập nhật hoạt động học sinh
            mới nhất.
        </p>

    </div>

    <div class="card">

        <h3>
            📢 Thông báo
        </h3>

        <p>
            Theo dõi thông báo
            từ nhà trường.
        </p>

    </div>

    <div class="card">

        <h3>
            🏆 Thành tích
        </h3>

        <p>
            Thành tích học tập
            và phong trào.
        </p>

    </div>

</section>


<script type="module"
        src="script.js"></script>

</body>
</html>
