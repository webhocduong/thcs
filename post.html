<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Đăng bài</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<header>

    <div class="logo">
        THCS Hòa Chung
    </div>

</header>

<!-- FORM -->

<div class="postContainer">

    <h1>
        Đăng bài viết
    </h1>

    <input
        type="text"
        id="title"
        placeholder="Tiêu đề"
    >

    <textarea
        id="content"
        placeholder="Nội dung"
    ></textarea>

    <input
        type="file"
        id="imageInput"
        accept="image/*"
    >

    <button id="postBtn">
        Đăng bài
    </button>

    <button
        onclick="window.location.href='index.html'"
    >
        Về trang chủ
    </button>

</div>

<!-- POSTS -->

<h1 class="center">
    Bài viết học sinh
</h1>

<div id="postsContainer"></div>

<script type="module"
        src="post.js"></script>

</body>
</html>
