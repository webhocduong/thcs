<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>Đăng bài</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="postContainer">

    <h1>
        Đăng bài viết
    </h1>

    <input
        type="text"
        id="title"
        placeholder="Tiêu đề"
    >

    <textarea
        id="content"
        placeholder="Nội dung"
    ></textarea>

    <button id="postBtn">
        Đăng bài
    </button>

    <a href="index.html">

        <button>
            Về trang chủ
        </button>

    </a>

</div>

<script type="module"
        src="post.js"></script>

</body>
</html>
