<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng bài - THCS Hòa Chung</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <div class="logo-area">

            <img
                src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_Vietnam_Education.svg"
                class="logo"
            >

            <div>
                <h1>THCS Hòa Chung</h1>

                <p>Cổng thông tin học sinh</p>
            </div>

        </div>

        <a href="index.html" class="back-btn">
            ← Trang chủ
        </a>

    </header>

    <!-- FORM ĐĂNG BÀI -->
    <main class="post-page">

        <div class="post-box">

            <h2>Đăng bài viết</h2>

            <form id="postForm">

                <!-- TIÊU ĐỀ -->
                <input
                    type="text"
                    id="title"
                    placeholder="Nhập tiêu đề bài viết"
                    required
                >

                <!-- NỘI DUNG -->
                <textarea
                    id="content"
                    placeholder="Nhập nội dung bài viết"
                    required
                ></textarea>

                <!-- ẢNH -->
                <label class="upload-label">
                    Chọn ảnh (không bắt buộc)
                </label>

                <input
                    type="file"
                    id="image"
                    accept="image/*"
                >

                <!-- NÚT -->
                <button type="submit" class="post-btn">
                    Đăng bài
                </button>

            </form>

        </div>

    </main>

    <!-- SCRIPT -->
    <script type="module" src="post.js"></script>

</body>

</html>
